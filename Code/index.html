<!DOCTYPE HTML>
<html>
    <head>
        <meta charset="UTF-8">
        
        <title>Project A - Simple Web Calculator - By Bradley McMillan</title>
        <script type="text/javascript" src="jquery.js"></script>
        <script type="text/javascript" src="myscript.js"></script>

    </head>

    <body>
        <h1>Welcome to my calculator web application!</h1>

        <input type="text" id="screen"></input><br>
        
    
        <button class="btns" value="1">1</button>
        <button class="btns" value="2">2</button>
        <button class="btns" value="3">3</button><br>

        <button class="btns" value="4">4</button>
        <button class="btns" value="5">5</button>
        <button class="btns" value="6">6</button><br>

        <button class="btns" value="7">7</button>
        <button class="btns" value="8">8</button>
        <button class="btns" value="9">9</button><br>

        <button class="btns" value="(">(</button>
        <button class="btns" value="0">0</button>
        <button class="btns" value=")">)</button><br>
    
        <button class="btns" value="+">+</button>
        <button class="btns" value="-">-</button>
        <button class="btns" value="*">x</button>
        <button class="btns" value="/">÷</button>
    

        <button class="ans" value="=">=</button> 
        <button class="clear" value="c">C</button>
    

        <footer>
            <p>&copy; 2026 Bradley McMillan</p>
            <a href="https://github.com/B-Rad-Ctrl">Visit my Github profile?</a>
        </footer>

    </body>
</html>
