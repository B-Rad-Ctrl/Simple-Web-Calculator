<!DOCTYPE HTML>
<html>
    <head>
        <meta charset="UTF-8">
        
        <title>Project A - Simple Web Calculator - By Bradley McMillan</title>
        <script type="text/javascript" src="jquery.js"></script>
        <script type="text/javascript" src="myscript.js"></script>

    </head>

    <body>
        <h1>Welcome to my calculator web application!</h1>

        <div class="btns">
            <button id="1" value="1">1</button>
            <button id="2" value="2">2</button>
            <button id="3" value="3">3</button><br>
            <button id="4" value="4">4</button>
            <button id="5" value="5">5</button>
            <button id="6" value="6">6</button><br>
            <button id="7" value="7">7</button>
            <button id="8" value="8">8</button>
            <button id="9" value="9">9</button><br>
            <button id="0" value="0">0</button>
        </div>

        <div class="operators">
            <button id="add" value="+">+</button>
            <button id="minus" value="-">-</button>
            <button id="multiply" value="*">x</button>
            <button id="divide" value="/">%</button>
            <button id="equals" value="equals">=</button> 
        </div>

        <footer>
            <p>&copy; 2026 Bradley McMillan</p>
            <a href="https://github.com/B-Rad-Ctrl">Visit my Github profile?</a>
        </footer>

    </body>
</html>
